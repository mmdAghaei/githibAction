name: Run Python Script Every 5 Minutes

on:
  push:
    branches: [ "main" ]
  # schedule:
  #   # این خط اسکریپت را هر 5 دقیقه یکبار اجرا می‌کند
  #   - cron: '*/59 * * * *'
  workflow_dispatch: # برای اینکه بتوانید دستی هم تست کنید

jobs:
  run-on-linux:
    # استفاده از آخرین نسخه لینوکس اوبونتو
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install playwright
          playwright install-deps
          playwright install chromium

          
          

      - name: Run my script
        run: python script.py
        # run: python script.py  10.88.1.27 -p 135 -d 1000

        
      - name: Upload Screenshot Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-screenshots  # نام پوشه آرتیفکت
          path: ".png"             # تمام فایل‌های png را بردارد (یا مسیر دقیق فایل خود را بدهید)
